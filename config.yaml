# =============================================================================
# mlb_value_bot configuration
#
# Everything that controls model behavior, thresholds, and bet sizing lives
# here so you can tune the bot WITHOUT touching code. Reloaded on every run.
#
# The model produces a home-team win probability by starting from a base rate
# and applying a series of additive probability deltas, each scaled by a weight
# defined under `model.weights`. Set a weight to 0.0 to disable a component
# entirely; raise it to make that factor matter more. See
# analysis/win_probability.py for exactly how each delta is computed.
# =============================================================================

odds_api:
  base_url: "https://api.the-odds-api.com/v4"
  sport_key: "baseball_mlb"
  # us + uk gets us DraftKings/FanDuel/BetMGM (squares for bet price) plus
  # Pinnacle (sharp consensus). Adding more regions costs no quota.
  regions: "us,uk"
  markets: "h2h"           # moneyline
  odds_format: "american"
  # Books we ASK the API for. Books not actually returned by your tier are
  # silently skipped (e.g. caesars/bookmaker/circa weren't on this tier on
  # 2026-05-28). The engine uses `bet_bookmaker` for the actual bet price
  # and `sharp_bookmakers` / `square_bookmakers` for the sharp/square signal.
  bookmakers:
    - "draftkings"         # bet price (also a square)
    - "fanduel"            # square consensus
    - "betmgm"             # square consensus
    - "pinnacle"           # GOLD-STANDARD sharp consensus (uk region)
    - "betonlineag"        # sharp offshore
    - "lowvig"             # sharp (Bookmaker.eu operator)
  # The bot extracts THIS book's price for actual betting decisions. Keeps the
  # displayed line == the price you'll bet, even when other listed books offer
  # better numbers. Must be one of the bookmakers above.
  bet_bookmaker: "draftkings"
  # Used by the market-intelligence signal (#5): we compare the de-vigged
  # probability across each group and surface "sharp vs square" divergence
  # plus dispersion. A pick that the sharps fade gets a confidence haircut
  # and (if extreme) the divergence sanity guard skips it outright.
  sharp_bookmakers:
    - "pinnacle"
    - "betonlineag"
    - "lowvig"
  square_bookmakers:
    - "draftkings"
    - "fanduel"
    - "betmgm"
  request_timeout_seconds: 20

mlb_api:
  base_url: "https://statsapi.mlb.com/api"
  request_timeout_seconds: 20

cache:
  # TTL for pybaseball / Statcast parquet pulls, in hours.
  ttl_hours: 24

# FanGraphs CSV fallback. FanGraphs sits behind a Cloudflare JS challenge that
# 403s all scrapers (pybaseball included), so the reliable way to get xFIP/SIERA/
# K-BB%/wRC+/bullpen-FIP is to export the leaderboards from your browser and drop
# the CSVs in `dir` below. The model prefers these over (blocked) live scraping.
# See README "FanGraphs CSV workflow" and `python -m mlb_value_bot data-status`.
fangraphs_csv:
  enabled: true
  dir: "storage/fangraphs"
  # {season} is substituted; the season-less name (pitching.csv) also works.
  pitching_filename: "pitching_{season}.csv"
  batting_filename: "batting_{season}.csv"

# -----------------------------------------------------------------------------
# League-average constants used to convert rate stats into win-equivalents.
# These are the "anchors" the model regresses toward. Update them seasonally.
# -----------------------------------------------------------------------------
league:
  avg_xfip: 4.00          # league-average xFIP (runs/9)
  avg_siera: 4.00         # league-average SIERA (runs/9)
  avg_bullpen_fip: 4.10   # league-average relief FIP
  runs_per_win: 10.0      # ~10 runs ≈ 1 win (Pythagorean rule of thumb)
  runs_per_game: 4.5      # league-average runs scored per team per game
  # Used to derive a pitcher run-prevention rate from Statcast xwOBA-against
  # when FanGraphs (xFIP/SIERA) is unavailable. statcast_rate (runs/9) =
  #   avg_xfip + (xwoba_against - avg_xwoba) * xwoba_to_run9
  # so it lands on the same ~4.00 scale the model already uses.
  avg_xwoba: 0.315        # league-average xwOBA against
  xwoba_to_run9: 40.0     # wOBA points -> runs/9 (e.g. .025 below avg ≈ -1.0 run)

# -----------------------------------------------------------------------------
# Win-probability model
# -----------------------------------------------------------------------------
model:
  # Primary pitcher rate stat: "xfip" or "siera". Falls back to the other if
  # the preferred one is missing for a given pitcher.
  pitcher_stat: "xfip"

  # Early-season regression of team win% toward .500.
  # regressed_wp = (wins + k*0.5) / (games + k). Larger k = more regression.
  team_regression_games: 30

  # Converts a 1-run/9 difference in pitcher xFIP/SIERA into a win-prob points
  # delta vs a league-average pitcher (before log5). 1 run/9 over ~6 IP and the
  # runs_per_win rule lands around 0.06-0.07 win% per run; 0.065 is a sane start.
  pitcher_run_to_winpct: 0.065

  # Cap the starter component's win-prob swing. The SP delta (log5 of pitcher
  # win-equivalents) was otherwise UNBOUNDED and dominated on extreme matchups /
  # thin samples (observed -9% to +21%). Clamp to +/- this. Other components are
  # already clamped (bullpen 0.10, park/form 0.05). Tune via backtest.
  starter_clamp: 0.15

  # Converts a 1-run bullpen FIP differential into a win-prob delta. Bullpens
  # throw ~1/3 of innings, so the per-run effect is smaller than the starter's.
  bullpen_run_to_winpct: 0.022

  # --- Bullpen fatigue: the LIVE tiered schedule + missing-feed conf penalty
  # live at the top-level `bullpen_fatigue:` section (end of file). The two
  # model-scoped fields below are just (a) a defensive clamp on the net
  # delta and (b) a deprecated knob kept for one-line rollback.
  # Safety clamp on the NET fatigue delta. Schedule max is -3pp so this only
  # kicks in for hypothetical out-of-range inputs; defensive guard only.
  bullpen_fatigue_clamp: 0.03
  # DEPRECATED 2026-05-30: superseded by bullpen_fatigue.penalty_by_unavailable.
  # Kept so a manual rollback to the old linear formula is one line. The
  # new code path doesn't read this.
  bullpen_fatigue_scale: 0.012

  # --- Lineup (key bats in / out of today's confirmed batting order) --------
  # Each missing key bat tilts toward the opponent by this much; net delta is
  # (away_missing - home_missing) * scale, clamped to +/- lineup_clamp. Only
  # applied when BOTH teams' lineups are confirmed -- projected -> 0 + a
  # confidence penalty instead (config.lineup.*).
  lineup_per_missing_bat_scale: 0.005
  lineup_clamp: 0.02

  # Recent-form scaling (see analysis/win_probability.py).
  form_scale: 0.5
  # Recent xwOBA/CSW is regressed toward the pitcher's SEASON value to damp
  # hot/cold-streak noise: blended = form_recent_weight*recent + (1-w)*season.
  # Used as the legacy fallback when the multi-window fields aren't populated.
  form_recent_weight: 0.6
  # CAP for the recent-form component. 14d xwOBAcon is ~50 batted balls --
  # mostly variance. Tightened 2026-05-30 from +/-5% to +/-1.5% normal /
  # +/-2.5% extreme so a hot/cold streak can't swing a game several wp pts
  # on what's effectively noise. Extreme cap is only allowed when 14d AND
  # 30d agree directionally with the blended diff AND both pitchers clear
  # the BIP floor below.
  form_normal_cap: 0.015
  form_extreme_cap: 0.025
  form_extreme_min_bip_14d: 30   # both pitchers need >= this BIP in 14d for extreme cap
  form_extreme_min_bip_30d: 70   # both pitchers need >= this BIP in 30d for extreme cap
  # Fragility flag threshold: when the 14d window contributes >= this share
  # of either pitcher's weighted blend, the form component is tagged fragile
  # and Step 3's pick-level classifier treats a form-dominated edge as
  # fragile too. 0.60 is conservative -- a healthy three-window blend has
  # 14d at 0.50 (the configured d14 weight) and only crosses 0.60 when 30d
  # or season drop under their sample floors.
  form_fragile_w14_share: 0.60
  # Multi-window form blend (added 2026-05-28). Slices the same 30d Statcast
  # pull at 14 days, 30 days, and uses the season xwOBA-on-contact as anchor.
  # Weights are NORMALIZED at use time, so missing windows redistribute weight
  # to the available ones (rotation skips / IL stints don't break form).
  #   14d 50% / 30d 30% / season 20%  -- recent matters more, season prevents drift.
  form_windows:
    d14: 0.5
    d30: 0.3
    season: 0.2
  # Sample-size floors: BIP (batted balls in play) required for the window to
  # contribute. Below this, the window is dropped and weight redistributes.
  # 14d default ~25 BIP (one start of contact); 30d default ~60 BIP (~3 starts).
  form_min_bip:
    d14: 25
    d30: 60

  # --- Market anchoring (calibration) ---------------------------------------
  # The betting market is the sharpest public probability estimate. Rather than
  # trust the standalone model (which, like any heuristic, "finds" edges
  # everywhere), we blend the model toward the de-vigged market:
  #   final_prob = market_blend * model_prob + (1 - market_blend) * market_prob
  # 0.0 = trust the market entirely (no bets ever); 1.0 = ignore the market
  # (overconfident, flags everything). Keep this LOW — the model should express
  # a bounded tilt off the market, not replace it.
  #
  # As of 2026-05-28 this is a tiered table driven by DATA confidence (the
  # confidence sub-components that don't depend on EV: data completeness,
  # sample size, component agreement). The model earns more weight when its
  # inputs are trustworthy, and stays anchored to the market when they're not.
  # The thresholds and weights are intentionally CONSERVATIVE — even the
  # high-conf tier (0.45) keeps the market as the primary anchor. Raise the
  # tier values only after CLV proves out at that confidence level.
  #
  # To revert to the old fixed behavior, set `market_blend: 0.35` (a scalar).
  # The pipeline handles both shapes (see resolve_market_blend).
  # Override per-run with the --market-blend CLI flag (still scalar-only).
  #
  # IMPORTANT distinction (do NOT conflate these in future edits):
  #   * DATA CONFIDENCE drives this blend table. It is the non-EV portion of
  #     the confidence score (data_completeness + sample_size + component
  #     agreement). Weighting the blend by HOW GOOD YOUR DATA IS is legitimate
  #     -- more complete inputs -> trust the model read more. Not circular.
  #   * MODEL CONF (the full confidence score the UI displays, which folds in
  #     edge_magnitude i.e. EV) MUST NOT drive the blend. Using the model's
  #     self-assessed edge to decide how much to trust the model is a feedback
  #     loop that amplifies overconfidence -- explicitly banned.
  # If you ever want to widen this table or add a tier, base it on
  # data_confidence (see compute_data_confidence). Do NOT swap it for the
  # full confidence score.
  market_blend:
    high_conf: 0.45          # data confidence >= high_threshold
    mid_conf: 0.35           # data confidence in [mid_threshold, high_threshold)
    low_conf: 0.25           # data confidence < mid_threshold
    high_threshold: 85.0     # 0..100 scale
    mid_threshold: 70.0

  # Sample-size regression for the Statcast-derived rate (statcast_rate). Until a
  # pitcher has faced this many batters, his xwOBA-against is shrunk toward
  # league average, so a few hot/cold starts don't read as ace/replacement level.
  # Raised 200 -> 250 on 2026-05-27 (~60 IP of faced batters) to further damp
  # small-sample volatility; tune via backtest.
  statcast_regression_pa: 250

  # Each component below is computed as a probability delta in [-x, x] and then
  # multiplied by its weight. Net home_wp = base_wp + sum(weight_i * delta_i),
  # clamped to [prob_floor, prob_ceiling].
  weights:
    starter: 1.0          # SP matchup (log5 of pitcher win-equivalents)
    bullpen: 1.0          # relief corps FIP differential
    bullpen_fatigue: 1.0  # leverage-arm availability today (added 2026-05-28)
    lineup: 1.0           # key bats in / out of today's confirmed lineup
    park: 0.25            # ballpark run environment (mostly a totals factor;
                          # small ML effect, kept low + tunable on purpose)
    home_field: 1.0       # constant home-field edge
    form: 1.0             # recent pitcher (last N starts) + offense (last 14d)

  # Home-field advantage (win-prob points added to the HOME side). Park-specific:
  # look up the home team in park_hfa, else fall back to default_park_hfa. This
  # replaces the old flat home_field_advantage (kept below only as a last resort).
  default_park_hfa: 0.025
  park_hfa:
    "Colorado Rockies": 0.045      # Coors Field (altitude)
    "Boston Red Sox": 0.030        # Fenway Park
    "New York Yankees": 0.028      # Yankee Stadium
    "Los Angeles Dodgers": 0.025   # Dodger Stadium
    "Kansas City Royals": 0.023    # Kauffman Stadium
  home_field_advantage: 0.035      # legacy fallback (used only if park_hfa/default absent)
  prob_floor: 0.02
  prob_ceiling: 0.98

# -----------------------------------------------------------------------------
# EV / bet sizing
# -----------------------------------------------------------------------------
ev:
  # Flag a bet as +EV when EV% >= this threshold. 0.03 = 3%. Deliberately not
  # 5% — too high a bar filters out almost everything early in the season.
  threshold: 0.03

  # De-vig method for converting the two-sided market into fair probabilities:
  # "power" (iterative, accounts for favorite-longshot bias) or "proportional".
  devig_method: "power"

# -----------------------------------------------------------------------------
# Sanity guards — reject games whose market data is implausible, so a bad or
# stale odds feed can never manufacture fake "edge" (e.g. a public dashboard
# flashing +400% EV on a +3300 placeholder line). A failing game is SKIPPED with
# a reason; it is never saved, ranked, or shown as a pick. These bounds sit far
# outside real MLB markets (underdogs top out ~+330; real +EV is low single-to-
# double-digit %), so they catch garbage without rejecting legitimate games.
# -----------------------------------------------------------------------------
sanity:
  max_abs_odds: 800     # skip if either side's American moneyline exceeds +/-800
  max_ev: 0.30          # skip a pick whose EV exceeds 30% (almost surely bad odds)
  # If the RAW model and de-vigged market disagree by more than this many
  # probability points, skip the game. We've observed real cases where a late
  # starter scratch moves the market 25-30pp while our probable-pitcher data
  # is still on the announced starter -- that gap manufactured a fake 12.6%
  # EV on Sox/Braves 2026-05-28. 0.15 is conservative; tune via backtest.
  max_model_market_divergence: 0.15
  # Sharp-fade skip threshold (#5). If our blended pick disagrees with the
  # sharp consensus on the side we're recommending by MORE than this many
  # probability points, skip the game -- the sharps know something we don't.
  # 5pp is conservative; tune via backtest. Set to a very large number to
  # disable while leaving the rest of the sharp/square signal active.
  max_sharp_disagreement_pp: 5.0

kelly:
  fraction: 0.25          # quarter-Kelly
  max_bankroll_fraction: 0.02   # never stake more than 2% of bankroll

# -----------------------------------------------------------------------------
# Adjusted EV (Step 4, 2026-05-30)
# "Raw EV" is the pure model-vs-price edge (model_prob*decimal - 1), displayed
# unchanged. "Adjusted EV" applies a few SMALL, signed context haircuts/boosts
# the raw number can't see, and is the value the sizing tiers (below) read.
#
# IMPORTANT: this is the SINGLE home for the sharp-fade penalty. It used to
# ALSO live in the confidence score ("confidence -X for Ypp sharp fade") and
# as a separate Strong->Standard tier downgrade; both of those were removed
# when Adjusted EV shipped so the sharp signal is counted exactly once.
#
# Sign convention (see pipeline._compute_adjusted_ev): sharp_fade_pp is +ve
# when WE are more bullish on the pick side than the sharp consensus (we're
# FADING the sharps) and -ve when the sharps are even more bullish than we are
# (sharp SUPPORT). All magnitudes below are decimal fractions (0.01 = 1pp EV).
# -----------------------------------------------------------------------------
adjusted_ev:
  # Sharp consensus agrees with our side (by >= this many pp) -> small boost.
  sharp_support_pp: 3.0
  sharp_support_boost: 0.010        # +1.0pp EV
  # We fade the sharps by >= this many pp -> small reduction.
  sharp_fade_pp: 3.0
  sharp_fade_reduction: 0.010       # -1.0pp EV
  # We fade the sharps by >= this many pp -> larger reduction. (Above
  # sanity.max_sharp_disagreement_pp the game is SKIPPED outright, so this
  # bites in the [large, skip) band.)
  sharp_fade_large_pp: 5.0
  sharp_fade_large_reduction: 0.020 # -2.0pp EV
  # NOTE (2026-06-04): projected_lineup_reduction was REMOVED. A projected/
  # unconfirmed lineup no longer haircuts EV (nor downgrades the sizing tier).
  # It fired on every pre-lineup (morning) run, so it was a flat slate-wide tax
  # rather than a discriminating signal. The uncertainty is now carried solely
  # by the graduated lineup CONFIDENCE penalty (config.lineup.confidence_penalty).
  # Edge classified FRAGILE by Step 3 (form-driven / missing data) -> shave.
  # Lowered 1.5 -> 1.0pp on 2026-06-05: fragile was firing on 56% of all games
  # (a flat slate-wide tax, not a discriminator), so its magnitude is reduced to
  # match its near-universal fire rate. Pairs with raising stability.sharp_fade_
  # fragile_pp 2->3 (below) so a normal 2-3pp model-vs-sharp gap no longer trips
  # the fragile label at all. Fragile now SIZES a pick down (Step 5), it does not
  # veto it -- see _classify_bet_tier's is_raw_pick floor.
  fragile_reduction: 0.010          # -1.0pp EV

# -----------------------------------------------------------------------------
# Bet sizing tiers (Step 5, 2026-05-30) — classify each pick into
# Pass/Small/Standard/Strong on ADJUSTED EV (not Raw), then cap the Kelly
# stake per tier. Deliberately CONSERVATIVE: the model is unproven on a small
# graded sample, so we cap hard and downgrade on any quality flag.
# See pipeline._classify_bet_tier / _kelly_cap_for_tier.
#
#   Adjusted EV band      tier        Kelly cap (fraction of bankroll)
#     < 2.0%              pass        0.0%   (not action)
#     2.0% - 4.9%         small/lean  0.5%
#     5.0% - 7.9%         standard    1.0%
#     >= 8.0%             strong      2.0%   (FLAG FOR MANUAL REVIEW -- see code)
#
# Downgrade ONE tier (a single step, no matter how many fire) if confidence <
# downgrade_confidence, OR the edge is FRAGILE *and the band tier is Strong*
# (the "never Strong on fragile" hard rule). (The lineup-unconfirmed downgrade
# was removed 2026-06-04 -- it taxed every pre-lineup run; projected-lineup
# uncertainty now lives only in the lineup confidence penalty.) We do NOT
# add a general fragile or sharp-fade downgrade here -- BOTH penalties already
# live in Adjusted EV (Step 4: fragile_reduction / sharp_fade_reduction), so a
# general tier step would double-count them (a pp haircut AND a full tier). A
# fragile small/standard pick therefore keeps its tier; only the rare Strong
# band is capped (strong -> standard).
# -----------------------------------------------------------------------------
bet_sizing:
  # Adjusted-EV band edges (decimal fractions). pass < small_ev <= small <
  # standard_ev <= standard < strong_ev <= strong.
  small_ev: 0.02               # >= this (and < standard_ev) -> small/lean
  standard_ev: 0.05            # >= this (and < strong_ev)   -> standard
  strong_ev: 0.08              # >= this                     -> strong
  # Below this confidence (0..100), downgrade one tier.
  # Lowered 65 -> 60 on 2026-06-04: the stored confidence distribution clusters
  # right on 65, and a routine morning-run lineup penalty (-5 both-projected)
  # slid ~half the slate under 65 -- re-creating a soft version of the removed
  # projected-lineup tax. 60 keeps the cliff below the typical penalized score
  # so the downgrade fires on genuinely low confidence, not just "ran early".
  downgrade_confidence: 60
  # Per-tier Kelly caps (fraction of bankroll). The stake is min(raw quarter-
  # Kelly, cap_for_tier); pass -> 0. These are TIGHTER than kelly.max_bankroll_
  # fraction for small/standard on purpose.
  kelly_caps:
    pass: 0.0
    small: 0.005
    standard: 0.010
    strong: 0.020

# -----------------------------------------------------------------------------
# Confidence score weights (0-100). Components are each normalized to [0,1] and
# combined as a weighted average, then scaled to 100. See win_probability.py
# (compute_confidence) for the exact formula and rationale.
# -----------------------------------------------------------------------------
confidence:
  weights:
    data_completeness: 0.30   # did we get both pitchers + team data?
    sample_size: 0.20         # pitcher IP relative to a "trustworthy" threshold
    edge_magnitude: 0.25      # bigger edges -> more confidence (capped)
    component_agreement: 0.25 # are the model factors all leaning one way?
  # Pitcher IP at which sample-size confidence saturates to 1.0.
  ip_full_confidence: 60.0
  # EV% at which edge-magnitude confidence saturates to 1.0 (0.10 = 10%).
  edge_full_confidence: 0.10

# -----------------------------------------------------------------------------
# Hardcoded ballpark factors (100 = neutral, >100 favors offense).
# Keyed by MLB team name (home team). Source: rough multi-year runs park
# factors; edit freely. Used by the `park` model component.
# -----------------------------------------------------------------------------
park_factors:
  "Colorado Rockies": 112
  "Boston Red Sox": 108
  "Cincinnati Reds": 106
  "Kansas City Royals": 104
  "Arizona Diamondbacks": 103
  "Philadelphia Phillies": 102
  "Baltimore Orioles": 102
  "Texas Rangers": 102
  "Los Angeles Angels": 101
  "Toronto Blue Jays": 101
  "Atlanta Braves": 101
  "Chicago Cubs": 100
  "Minnesota Twins": 100
  "Washington Nationals": 100
  "Houston Astros": 100
  "St. Louis Cardinals": 99
  "Pittsburgh Pirates": 99
  "Chicago White Sox": 99
  "New York Yankees": 99
  "Milwaukee Brewers": 98
  "Los Angeles Dodgers": 98
  "Detroit Tigers": 98
  "New York Mets": 97
  "Tampa Bay Rays": 97
  "Cleveland Guardians": 97
  "Athletics": 96
  "San Diego Padres": 96
  "Seattle Mariners": 95
  "San Francisco Giants": 94
  "Miami Marlins": 94

# Default park factor when a team isn't in the table above.
default_park_factor: 100

# -----------------------------------------------------------------------------
# Bullpen fatigue (added 2026-05-28)
# Per-team availability of leverage arms (each team's top-N relievers by season
# ERA). Pulled from the MLB Stats API: per-pitcher reliever stats are fetched
# once per slate; each team's last few finalized games are boxscored to figure
# out who pitched and how heavily. See data/bullpen_status.py.
# -----------------------------------------------------------------------------
bullpen_fatigue:
  enabled: true
  leverage_top_n: 3                    # per team, by lowest season ERA
  min_appearances_for_leverage: 8      # sample-size floor for the leverage list
  pitch_threshold_unavailable: 35      # pitches yesterday -> unavailable today
  appearance_threshold: 3              # games in last 3 days -> unavailable
  lookback_days: 5                     # window to find the last 3 finalized games
  # Tiered per-team probability penalty schedule (2026-05-30, Step 2).
  # Indexed by # leverage arms unavailable: [0_down, 1_down, 2_down, 3_down].
  # Non-linear on purpose: one arm down barely matters; a 0/3 pen is a real
  # signal. Net delta on home_win_prob = home_penalty - away_penalty (<=0).
  penalty_by_unavailable: [0.0, -0.005, -0.015, -0.030]
  # Confidence reduction when the bullpen-availability feed is genuinely
  # unavailable for a team (distinct from "3/3 available" -- that's a real
  # read of "everyone's rested" and gets no penalty). One unit per team.
  unavailable_confidence_penalty_per_team: 2.0

# -----------------------------------------------------------------------------
# Lineup confirmation (added 2026-05-28)
# Pulls each team's published batting order from the MLB v1.1 game feed once
# it's posted (~2h before first pitch). Identifies each team's "key bats"
# (top N by season OPS, with a PA floor) and tilts the win prob toward the
# team with fewer key bats missing. See data/lineup_status.py.
# -----------------------------------------------------------------------------
lineup:
  enabled: true
  hours_before_first_pitch_to_check: 3.0   # before this, mark projected, save API calls
  key_bats_top_n: 3                        # per team, by highest season OPS
  min_pa_for_key_bats: 100                 # sample-size floor (e.g. ~25 games of starts)
  # Confidence penalty by lineup state (subtracted from data + full confidence).
  # DISTINGUISHES projected (not posted yet -- timing) from unavailable (a real
  # feed/API gap). Non-linear: both-projected is sub-additive (a quiet morning,
  # not an outage), while any unavailable side is the worst case. See
  # pipeline._lineup_confidence_penalty.
  confidence_penalty:
    one_projected: 3.0     # one side projected, other confirmed
    both_projected: 5.0    # both sides projected (still just "too early")
    data_unavailable: 6.0  # any side's feed unavailable / feature disabled

# -----------------------------------------------------------------------------
# Edge stability classification (Step 3, 2026-05-30)
# Labels each pick STABLE / MODERATE / FRAGILE based on which components are
# driving the edge plus a few hard fragility signals. The hard rule "never
# Strong on a fragile edge" lives in pipeline.evaluate_game; the thresholds
# below tune what counts as STABLE / FRAGILE.
# -----------------------------------------------------------------------------
stability:
  # A pick is STABLE if no hard fragile signals AND >= this share of the
  # positive (pick-aligned) component drive comes from STABLE drivers
  # (starter, bullpen, confirmed lineup).
  stable_share_min: 0.60
  # A pick is FRAGILE if (a) any hard fragile signal is present OR (b) this
  # share of the positive drive comes from FRAGILE drivers (fragile-flagged
  # form, components with available=False).
  fragile_share_min: 0.50
  # Sharp fade above this many pp on the pick side is a HARD fragile signal.
  # (Above 5pp the sanity guard SKIPS; this triggers in the [this, 5pp] range.)
  # Raised 2.0 -> 3.0 on 2026-06-05 to ALIGN with adjusted_ev.sharp_fade_pp (3.0):
  # a 2-3pp model-vs-sharp gap is normal when the model is only weighted 0.35-0.45
  # in the blend, so tagging it FRAGILE at 2pp made fragile fire on the majority of
  # the slate AND partially double-counted the sharp signal (fragile haircut at 2pp
  # PLUS the sharp-fade haircut at 3pp). Now both kick in at the same 3pp gap.
  sharp_fade_fragile_pp: 3.0
  # >= this many model components with available=False is a HARD fragile
  # signal regardless of which ones are driving the edge.
  missing_component_fragile_n: 2

