default_park_factor: 100

bullpen_fatigue:
  enabled: true
  leverage_top_n: 3
  min_appearances_for_leverage: 8
  pitch_threshold_unavailable: 35
  appearance_threshold: 3
  lookback_days: 5
  penalty_by_unavailable: [0.0, -0.005, -0.015, -0.030]
  unavailable_confidence_penalty_per_team: 2.0

lineup:
  enabled: true
  hours_before_first_pitch_to_check: 3.0
  key_bats_top_n: 3
  min_pa_for_key_bats: 100
  confidence_penalty:
    one_projected: 3.0
    both_projected: 5.0
    data_unavailable: 6.0

stability:
  stable_share_min: 0.60
  fragile_share_min: 0.50
  sharp_fade_fragile_pp: 3.0
  missing_component_fragile_n: 2

logging:
  level: "INFO"
  file: "storage/griffbet.log"
